name: Update Stats

on:
  schedule:
    - cron: '0 12 * * *'   # Daily at 12:00 UTC (5 AM or 6 AM Pacific)
  workflow_dispatch:         # Allow manual trigger from GitHub UI

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch standings and scores
        run: python fetch_stats.py

      - name: Fetch schedule
        run: python fetch_schedule.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add stats.json schedule.json
          git diff --staged --quiet || git commit -m "chore: daily stats update"
          git push
